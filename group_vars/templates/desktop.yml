---
# Desktop/laptop machine template for group_vars/all/local.yml.
# Usage: cp group_vars/templates/desktop.yml group_vars/all/local.yml
# Then edit at minimum: hostname, user.name, user.email

# Identity  (REQUIRED)
hostname: myhostname        # Short hostname for this machine
user:
  name: yourusername        # Your Linux username (must match existing user)
  uid: 1000
  gid: 1000
  group: yourusername
  shell: /usr/bin/zsh
  email: you@example.com
  log:
    dir: log
    rotate: 8
  githubuser: yourgithubusername

# Hardware
laptop: true                # true for laptops (enables power mgmt, trackpad config)
power_management: tuned     # tuned | tlp  (only used when laptop: true)
# regdomain: "US"           # Uncomment to set WiFi regulatory domain (ISO 3166-1 alpha-2 country code); required when a wireless adapter is present

# Display
desktop_environment: i3     # i3 | hyprland | gnome | awesome | kde
display_manager: lightdm    # lightdm | gdm | sddm
# disable_i3: false         # Set true to skip i3 install (manual dual-desktop mode only)
# disable_hyprland: false   # Set true to skip Hyprland install (manual dual-desktop mode only)
# disable_gnome: false      # Set true to skip GNOME install (manual dual-desktop mode only)
# disable_awesomewm: false  # Set true to skip AwesomeWM install (manual dual-desktop mode only)
# disable_kde: false        # Set true to skip KDE install (manual dual-desktop mode only)

# Boot
# kernel_parameters: "quiet consoleblank=60"   # Kernel cmdline for GRUB (overrides default GRUB_CMDLINE_LINUX_DEFAULT)

dotfiles:
  repo_url: "https://github.com/{{ user.githubuser }}/dotfiles.git"
  path: "{{ user.name }}/.dotfiles"
  rcup_flags: -fx README.md
  linuxgui: true            # Install GUI dotfiles (i3, waybar, rofi, etc.)

# Backlight / ambient light sensor
# Run: ls /sys/class/backlight/   to find your backlight device
# Run: ls /sys/bus/iio/devices/   to find your illuminance device (if present)
illuminanced:
  max_backlight_file: /sys/class/backlight/DEVICE/max_brightness
  backlight_file: /sys/class/backlight/DEVICE/brightness
  illuminance_file: /sys/bus/iio/devices/iio:device0/in_illuminance_input
  min_backlight: 60

# SSH
ssh:
  port: 22                  # SSH daemon listen port
  enable_sshd: true
  # user_key: files/id_rsa  # Optional: local SSH private key to install for the user

# Network
# Run: nmcli connection show   to find your trusted connection UUIDs
network:
  spoof_mac: true
  conn_check:
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 5
    response: 204
  wifi_wired_exclusive: true   # Disable WiFi when wired link is up
  trusted_uuid:
    - REPLACE-WITH-YOUR-UUID   # Run: nmcli connection show | grep UUID

# Bluetooth
bluetooth:
  disable: false            # true to disable bluetooth entirely
