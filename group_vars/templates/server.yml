---
# Headless server template for group_vars/all/local.yml.
# Usage: cp group_vars/templates/server.yml group_vars/all/local.yml
# Then edit at minimum: hostname, user.name, user.email

# Identity  (REQUIRED)
hostname: myserver          # Short hostname for this machine
user:
  name: yourusername        # Your Linux username (must match existing user)
  uid: 1000
  gid: 1000
  group: yourusername
  shell: /usr/bin/zsh
  email: you@example.com
  log:
    dir: log
    rotate: 8

# Hardware
laptop: false               # No power mgmt or trackpad config on servers
# regdomain: "US"           # Uncomment to set WiFi regulatory domain (ISO 3166-1 alpha-2 country code); required when a wireless adapter is present

# Boot
# kernel_parameters:        # Kernel cmdline params used for GRUB_CMDLINE_LINUX_DEFAULT (replaces default, e.g. "quiet")

# Manual mode display toggles — dispatcher applies these only in manual mode.
# Typically irrelevant for headless/server configs; kept here for reference.
# disable_i3: false         # Manual mode: set true to skip i3 install
# disable_hyprland: false   # Manual mode: set true to skip Hyprland install
# disable_gnome: false      # Manual mode: set true to skip GNOME install
# disable_awesomewm: false  # Manual mode: set true to skip AwesomeWM install
# disable_kde: false        # Manual mode: set true to skip KDE install
dotfiles:
  repo_url: https://github.com/GITHUB_USER/dotfiles.git
  path: "USERNAME/.dotfiles"
  rcup_flags: -fx README.md
  linuxgui: false           # Skip GUI dotfiles on headless servers

# SSH
ssh:
  port: 22                  # SSH daemon listen port
  enable_sshd: true
  # user_key: files/id_rsa  # Optional: local SSH private key to install for the user

# Network
# Run: nmcli connection show   to find your trusted connection UUIDs
network:
  spoof_mac: true
  conn_check:
    url: http://connectivitycheck.gstatic.com/generate_204
    interval: 5
    response: 204
  wifi_wired_exclusive: false  # Typically false on servers (wired only)
  trusted_uuid:
    - REPLACE-WITH-YOUR-UUID   # Run: nmcli connection show | grep UUID

# Bluetooth
bluetooth:
  disable: true             # Disable bluetooth on servers
