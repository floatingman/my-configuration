---
- name: Configure localhost
  hosts: localhost

  # ---------------------------------------------------------------------------
  # Profile Dispatcher
  # ---------------------------------------------------------------------------
  # Compute boolean flags once so every role gets a clean, single-variable
  # condition.  Supports:
  #   a) Profile mode   – pass `profile=<name>` (via `make profile-*`)
  #   b) Manual mode    – set display_manager / desktop_environment directly
  #                       (legacy / backward-compatible behaviour)
  # ---------------------------------------------------------------------------
  pre_tasks:
    - name: Resolve OS type
      set_fact:
        _is_arch: "{{ ansible_facts['os_family'] == 'Archlinux' }}"
      tags: always

    - name: Resolve profile via dispatcher
      command: >-
        {{ ansible_playbook_python | default(ansible_python_interpreter) | default('/usr/bin/python3') }}
        {{ playbook_dir }}/scripts/profile_dispatcher.py resolve
        --profiles-dir "{{ playbook_dir }}/profiles"
        --profile "{{ profile | default('manual') }}"
        {{ (display_manager is defined) | ternary('--display-manager "' ~ (display_manager | default('')) ~ '"', '') }}
        {{ (desktop_environment is defined) | ternary('--desktop-environment "' ~ (desktop_environment | default('')) ~ '"', '') }}
        {{ (disable_i3 is defined and disable_i3) | ternary('--disable-i3', '') }}
        {{ (disable_hyprland is defined and disable_hyprland) | ternary('--disable-hyprland', '') }}
        {{ (disable_gnome is defined and disable_gnome) | ternary('--disable-gnome', '') }}
        {{ (disable_awesomewm is defined and disable_awesomewm) | ternary('--disable-awesomewm', '') }}
        {{ (disable_kde is defined and disable_kde) | ternary('--disable-kde', '') }}
      register: _profile_result
      changed_when: false
      check_mode: false
      tags: always

    - name: Set profile facts from resolved JSON
      vars:
        _resolved: "{{ _profile_result.stdout | from_json }}"
      set_fact:
        _profile: "{{ _resolved.profile }}"
        _dm: "{{ _resolved.display_manager | default('', true) }}"
        _has_display: "{{ _resolved.has_display }}"
        _is_i3: "{{ _resolved.is_i3 }}"
        _is_hyprland: "{{ _resolved.is_hyprland }}"
        _is_gnome: "{{ _resolved.is_gnome }}"
        _is_awesomewm: "{{ _resolved.is_awesomewm }}"
        _is_kde: "{{ _resolved.is_kde }}"
      tags: always

  roles:
    # -------------------------------------------------------------------------
    # GPU Detection & Drivers (Arch-only)
    # -------------------------------------------------------------------------
    - { role: gpu_detect,            tags: ["gpu_detect"],         when: _is_arch }
    - { role: gpu_drivers,           tags: ["gpu_drivers"],        when: _is_arch }

    # -------------------------------------------------------------------------
    # Base System (Arch-only)
    # -------------------------------------------------------------------------
    - { role: base,                  tags: ["base"],               when: _is_arch }
    - { role: grub,                  tags: ["grub"],               when: _is_arch }
    - { role: microcode,             tags: ["microcode"],          when: _is_arch }

    # -------------------------------------------------------------------------
    # Universal System Configuration
    # -------------------------------------------------------------------------
    - { role: gnupg,                 tags: ["gnupg"] }
    - { role: sysmon,                tags: ["sysmon"] }
    - { role: cron,                  tags: ["cron"] }
    - { role: system,                tags: ["system"] }
    - { role: shell,                 tags: ["shell"] }
    - { role: ssh,                   tags: ["ssh"] }
    - { role: archive,               tags: ["archive"] }

    # -------------------------------------------------------------------------
    # Package Management
    # -------------------------------------------------------------------------
    - { role: ansible-role-packages, tags: ["packages"] }
    - { role: ansible-role-asdf,     tags: ["asdf"] }
    - { role: flatpak,               tags: ["flatpak"] }
    - { role: golang,                tags: ["golang"],             when: not _is_arch }
    - { role: homebrew,              tags: ["homebrew"],           when: not _is_arch }
    - { role: ansible-role-binaries, tags: ["binaries"],           when: not _is_arch }
    - { role: aur,                   tags: ["aur"],                when: _is_arch }

    # -------------------------------------------------------------------------
    # Development Tools
    # -------------------------------------------------------------------------
    - { role: editors,               tags: ["editors"] }
    - { role: filesystem,            tags: ["filesystem"] }
    - { role: python,                tags: ["python"] }
    - { role: rust,                  tags: ["rust"] }
    - { role: docker,                tags: ["docker"] }
    - { role: kubernetes,            tags: ["kubernetes"],         when: _is_arch }
    - { role: devtools,              tags: ["devtools"],           when: _has_display }

    # -------------------------------------------------------------------------
    # Networking (Arch-only)
    # -------------------------------------------------------------------------
    - { role: nmtrust,               tags: ["nmtrust"],            when: _is_arch and _has_display | bool }
    - { role: networkmanager,        tags: ["networkmanager"],     when: _is_arch and _has_display | bool }
    - { role: nettools,              tags: ["nettools"],           when: _is_arch }
    - { role: mirrorlist,            tags: ["mirrorlist"],         when: _is_arch }
    - { role: filesharing,           tags: ["filesharing"],        when: _is_arch }

    # -------------------------------------------------------------------------
    # Productivity & Utilities
    # -------------------------------------------------------------------------
    - { role: taskwarrior,           tags: ["taskwarrior"],        when: _is_arch }
    - { role: pass,                  tags: ["pass"],               when: _is_arch }
    - { role: spell,                 tags: ["spell"] }
    - { role: clipboard,             tags: ["clipboard"],          when: _is_arch }
    - { role: clouddrive,            tags: ["clouddrive"],         when: _is_arch }
    - { role: syncthing,             tags: ["syncthing"] }

    # -------------------------------------------------------------------------
    # Display Manager
    # -------------------------------------------------------------------------
    - role: lightdm
      tags: ["lightdm"]
      when: "_has_display and _dm == 'lightdm'"
    - role: gdm
      tags: ["gdm"]
      when: "_has_display and _dm == 'gdm'"

    # -------------------------------------------------------------------------
    # Profile: i3 (X11 tiling window manager)
    # -------------------------------------------------------------------------
    - { role: x,                     tags: ["x"],                  when: _is_i3 }
    - { role: i3,                    tags: ["i3"],                 when: _is_i3 }

    # -------------------------------------------------------------------------
    # Profile: Hyprland (Wayland compositor)
    # -------------------------------------------------------------------------
    - { role: wayland,               tags: ["wayland"],            when: _is_hyprland }
    - { role: hyprland,              tags: ["hyprland"],           when: _is_hyprland }
    - { role: qt_gtk_toolkit,        tags: ["qt_gtk_toolkit"],     when: _is_hyprland }
    - { role: widgets,               tags: ["widgets"],            when: _is_hyprland }
    - { role: uv_python_packages,    tags: ["uv_python_packages"], when: _is_hyprland }
    - { role: microtex,              tags: ["microtex"],           when: _is_hyprland }
    - { role: oneui4_icons,          tags: ["oneui4_icons"],       when: _is_hyprland }
    - { role: screencapture,         tags: ["screencapture"],      when: _is_hyprland }

    # -------------------------------------------------------------------------
    # Profile: GNOME
    # -------------------------------------------------------------------------
    - { role: gnome,                 tags: ["gnome"],              when: _is_gnome }

    # -------------------------------------------------------------------------
    # Profile: AwesomeWM
    # -------------------------------------------------------------------------
    - { role: awesomewm,             tags: ["awesomewm"],          when: _is_awesomewm }

    # -------------------------------------------------------------------------
    # Profile: KDE
    # -------------------------------------------------------------------------
    - { role: kde,                   tags: ["kde"],                when: _is_kde }

    # -------------------------------------------------------------------------
    # Fonts & Theming (any desktop profile)
    # -------------------------------------------------------------------------
    - { role: fonts,                 tags: ["fonts"],              when: "_is_arch and _has_display" }
    - { role: nerd-fonts,            tags: ["fonts"],              when: _has_display }
    - role: cursor-theme
      tags: ["cursor-theme"]
      when: "_has_display and cursor_theme.enabled"

    # -------------------------------------------------------------------------
    # Desktop Applications (any desktop profile)
    # -------------------------------------------------------------------------
    - { role: terminal,              tags: ["terminal"],           when: _has_display }
    - { role: notes,                 tags: ["notes"],              when: _has_display }
    - { role: browsers,              tags: ["browsers"] }
    - { role: filemanager,           tags: ["filemanager"] }
    - { role: screensaver,           tags: ["screensaver"],        when: _has_display }
    - { role: mpv,                   tags: ["mpv"],                when: _has_display }
    - { role: media,                 tags: ["media"],              when: _has_display }
    - { role: sound,                 tags: ["sound"],              when: _has_display }
    - { role: proton,                tags: ["proton"],             when: _has_display }
    - { role: android,               tags: ["android"],            when: _has_display }
    - { role: backlight,             tags: ["backlight"],          when: _has_display }
    - { role: mpd,                   tags: ["mpd"],                when: _has_display }
    - { role: twitch,                tags: ["twitch"],             when: _has_display }

    # Arch-specific desktop roles
    - { role: cups,                  tags: ["cups"],               when: "_is_arch and _has_display" }
    - { role: udisks,                tags: ["udisks"],             when: "_is_arch and _has_display" }

    # -------------------------------------------------------------------------
    # Optional / Feature-gated
    # -------------------------------------------------------------------------
    - { role: dotfiles,              tags: ["dotfiles"],           when: dotfiles is defined }
    - { role: goesimage,             tags: ["goesimage"],          when: "goesimage is defined and _has_display" }
    - { role: regdomain,             tags: ["regdomain"],          when: regdomain is defined }
    - { role: bluetooth,             tags: ["bluetooth"],          when: "_is_arch and bluetooth is defined" }
    - { role: laptop,                tags: ["laptop"],             when: laptop }

  vars_prompt:
    - name: user_password
      prompt: "Enter desired user password"
