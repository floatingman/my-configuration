- name: Install mpv
  become: true
  ansible.builtin.package:
    name: mpv
    state: present
  when: ansible_facts["os_family"] == "Archlinux"

- name: Push play script
  ansible.builtin.copy:
    src: play.sh
    dest: /usr/local/bin/play
    mode: "0755"
  become: true

- name: Install Vapoursynth
  become: true
  ansible.builtin.package:
    name: vapoursynth
    state: present
  when: ansible_facts["os_family"] == "Archlinux"

- name: Install vapoursynth-plugin-vmaf-git
  become: true
  kewlfft.aur.aur:
    name: vapoursynth-plugin-vmaf-git
    use: auto
    state: present
  become_user: aur_builder
  when: ansible_facts["os_family"] == "Archlinux"
  tags:
    - aur

- name: Install vapoursynth-plugin-mvtools-git
  become: true
  kewlfft.aur.aur:
    name: vapoursynth-plugin-mvtools-git
    use: auto
    state: present
  become_user: aur_builder
  when: ansible_facts["os_family"] == "Archlinux"
  tags:
    - aur

- name: Install vapoursynth-plugin-svpflow
  become: true
  kewlfft.aur.aur:
    name: vapoursynth-plugin-svpflow
    use: auto
    state: present
  become_user: aur_builder
  when: ansible_facts["os_family"] == "Archlinux"
  tags:
    - aur
