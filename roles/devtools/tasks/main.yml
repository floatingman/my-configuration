---
- name: Install Pycharm
  become: true
  kewlfft.aur.aur:
    name: pycharm
    use: auto
    state: present
  become_user: aur_builder
  when: ansible_facts["os_family"] == "Archlinux"
  tags:
    - aur

- name: Install Intellij
  become: true
  kewlfft.aur.aur:
