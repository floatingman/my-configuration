---
- name: Reconfigure NVIDIA if needed
  when: "'nvidia' in _drivers_to_install"
  block:
    - name: Update NVIDIA initramfs
      command: mkinitcpio -P
      become: true
      changed_when: true

    - name: Restart display manager
      systemd:
        name: "{{ display_manager }}"
        state: restarted
      become: true
      when: display_manager is defined
