---
# GPU driver configuration defaults
gpu_drivers_detection_mode: auto
gpu_drivers_type: null
gpu_drivers_nvidia_proprietary: true
gpu_drivers_hybrid_install_all: true

# Video tools to install based on GPU type (fallback defaults)
gpu_drivers_video_tools_amd:
  - radeontop
  - libva-utils

gpu_drivers_video_tools_nvidia:
  - nvidia-settings

gpu_drivers_video_tools_intel:
  - intel-gpu-top

# Default video tools (installed when no GPU detected)
gpu_drivers_video_tools_default:
  - libva-utils
