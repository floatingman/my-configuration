---
# tasks file for ai
- name: Check if Homebrew is available
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: homebrew_stat

- name: Set Homebrew availability fact
  ansible.builtin.set_fact:
    homebrew_available: "{{ homebrew_stat.stat.exists }}"

# -------------------------------------------------------------------------
# Claude Code (native installer)
# -------------------------------------------------------------------------
- name: Check if Claude Code is already installed
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/claude"
  register: claude_code_stat

- name: Install Claude Code via native installer
  ansible.builtin.shell: |
    curl -fsSL https://claude.ai/install.sh | sh
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: claude_code_install
  changed_when: claude_code_install.rc == 0
  when:
    - ai_claude_code_enabled | default(true)
    - not claude_code_stat.stat.exists

- name: Apply Claude Code configuration from chezmoi
  ansible.builtin.command: >
    chezmoi apply ~/.claude
  environment:
    HOME: "{{ ansible_env.HOME }}"
  register: chezmoi_claude_result
  changed_when: chezmoi_claude_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_enabled | default(true)
    - ai_claude_config_enabled | default(true)

# -------------------------------------------------------------------------
# CCometixLine (npm)
# -------------------------------------------------------------------------
- name: Install CCometixLine via npm
  community.general.npm:
    name: "@cometix/ccline"
    global: true
    state: present
  when: ai_ccometixline_enabled | default(true)

# -------------------------------------------------------------------------
# rtk (Rust tool - prefer Homebrew, fallback to cargo)
# -------------------------------------------------------------------------
- name: Install rtk via Homebrew
  community.general.homebrew:
    name: rtk-ai/rtk/rtk
    state: present
    path: /home/linuxbrew/.linuxbrew/bin
  when:
    - ai_rtk_enabled | default(true)
    - homebrew_available
  ignore_errors: true
  register: rtk_homebrew_result

- name: Install rtk via cargo (fallback)
  ansible.builtin.command:
    cmd: cargo install rtk
  when:
    - ai_rtk_enabled | default(true)
    - not homebrew_available or rtk_homebrew_result is failed
  register: rtk_cargo_result
  changed_when: rtk_cargo_result.rc != 0 or "already installed" not in rtk_cargo_result.stderr | default("")
  failed_when: false

# -------------------------------------------------------------------------
# claudectx (Go tool - prefer Homebrew, fallback to go install)
# -------------------------------------------------------------------------
- name: Install claudectx via Homebrew
  community.general.homebrew:
    name: foxj77/tap/claudectx
    state: present
    path: /home/linuxbrew/.linuxbrew/bin
  when:
    - ai_claudectx_enabled | default(true)
    - homebrew_available
  ignore_errors: true
  register: claudectx_homebrew_result

- name: Install claudectx via go install (fallback)
  ansible.builtin.command:
    cmd: go install github.com/foxj77/claudectx@latest
  environment:
    GOPATH: "{{ ansible_env.HOME }}/.local/go"
    PATH: "{{ ansible_env.PATH }}:{{ ansible_env.HOME }}/.local/go/bin"
  when:
    - ai_claudectx_enabled | default(true)
    - not homebrew_available or claudectx_homebrew_result is failed
  register: claudectx_go_result
  changed_when: claudectx_go_result.rc != 0
  failed_when: false

# -------------------------------------------------------------------------
# Claude Code Plugins
# -------------------------------------------------------------------------
- name: Ensure Claude Code is installed before plugin installation
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.local/bin/claude"
  register: claude_code_for_plugins
  when:
    - ai_claude_code_plugins_enabled | default(true)

- name: Install claude-plugins-official marketplace plugins
  ansible.builtin.shell: |
    {{ lookup('env', 'HOME') }}/.local/bin/claude plugin install {{ item }}
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  loop: "{{ ai_claude_official_plugins | default(claude_official_plugins_default) }}"
  register: plugin_official_result
  changed_when: plugin_official_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_plugins_enabled | default(true)
    - claude_code_for_plugins.stat.exists

- name: Install cc-skills marketplace plugins
  ansible.builtin.shell: |
    {{ lookup('env', 'HOME') }}/.local/bin/claude plugin install {{ item }}
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  loop: "{{ ai_claude_cc_skills_plugins | default(claude_cc_skills_plugins_default) }}"
  register: plugin_cc_skills_result
  changed_when: plugin_cc_skills_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_plugins_enabled | default(true)
    - claude_code_for_plugins.stat.exists

- name: Install everything-claude-code plugin
  ansible.builtin.shell: |
    {{ lookup('env', 'HOME') }}/.local/bin/claude plugin install everything-claude-code@everything-claude-code
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: plugin_everything_result
  changed_when: plugin_everything_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_plugins_enabled | default(true)
    - ai_everything_claude_code_enabled | default(true)
    - claude_code_for_plugins.stat.exists

- name: Add caveman custom marketplace
  ansible.builtin.shell: |
    {{ lookup('env', 'HOME') }}/.local/bin/claude plugin marketplace add caveman github://JuliusBrussee/caveman
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: caveman_marketplace_result
  changed_when: caveman_marketplace_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_plugins_enabled | default(true)
    - ai_caveman_enabled | default(true)
    - claude_code_for_plugins.stat.exists

- name: Install caveman plugin
  ansible.builtin.shell: |
    {{ lookup('env', 'HOME') }}/.local/bin/claude plugin install caveman@caveman
  environment:
    HOME: "{{ lookup('env', 'HOME') }}"
    PATH: "{{ lookup('env', 'PATH') }}:{{ lookup('env', 'HOME') }}/.local/bin"
  register: caveman_plugin_result
  changed_when: caveman_plugin_result.rc == 0
  failed_when: false
  when:
    - ai_claude_code_plugins_enabled | default(true)
    - ai_caveman_enabled | default(true)
    - claude_code_for_plugins.stat.exists
