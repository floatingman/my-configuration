---
# defaults file for ai
# Set to true to enable AI tooling on this machine; null disables it
ai_enabled: null

# Enable/disable individual AI tools
ai_claude_code_enabled: true
ai_claude_config_enabled: true
ai_ccometixline_enabled: true
ai_rtk_enabled: true
ai_claudectx_enabled: true

# Claude Code Plugins
ai_claude_code_plugins_enabled: true
ai_everything_claude_code_enabled: true
ai_caveman_enabled: true

# Default plugins to install from claude-plugins-official marketplace
ai_claude_official_plugins_default:
  - superpowers@claude-plugins-official
  - context7@claude-plugins-official
  - code-review@claude-plugins-official
  - code-simplifier@claude-plugins-official
  - github@claude-plugins-official
  - feature-dev@claude-plugins-official
  - playwright@claude-plugins-official
  - claude-md-management@claude-plugins-official
  - ralph-loop@claude-plugins-official
  - security-guidance@claude-plugins-official
  - commit-commands@claude-plugins-official
  - claude-code-setup@claude-plugins-official
  - pr-review-toolkit@claude-plugins-official
  - learning-output-style@claude-plugins-official
  - gopls-lsp@claude-plugins-official
  - rust-analyzer-lsp@claude-plugins-official
  - firecrawl@claude-plugins-official

# Default plugins to install from cc-skills marketplace
ai_claude_cc_skills_plugins_default:
  - dotfiles-tools@cc-skills
  - mise@cc-skills
