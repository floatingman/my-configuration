---
- name: Create the `aur_builder` user
  become: true
  ansible.builtin.user:
    name: aur_builder
    create_home: true
    group: wheel

- name: Allow the `aur_builder` user to run `sudo pacman` without a password
  become: true
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    create: true
    mode: '0440'
    validate: "visudo -cf %s"

- name: Install Yay
  kewlfft.aur.aur:
    name: yay
    use: auto
    state: present
  become: true
  become_user: aur_builder
  when: ansible_facts['os_family'] == "Archlinux" and aur is defined

- name: Install Arch Aur packages
  kewlfft.aur.aur:
    name: "{{ aur.packages }}"
    use: auto
    state: present
  become: true
  become_user: aur_builder
  when: ansible_facts['os_family'] == "Archlinux" and aur is defined

# highlight-pointer-git and slack-term-bin were previously installed from the
# AUR but are no longer managed here (unused; the `binaries` fallback is
# Debian-only). Remove them so leftover builds don't linger on existing hosts.
- name: Remove deprecated AUR packages
  kewlfft.aur.aur:
    name:
      - highlight-pointer-git
      - slack-term-bin
    use: auto
    state: absent
  become: true
  become_user: aur_builder
  when: ansible_facts['os_family'] == "Archlinux" and aur is defined
