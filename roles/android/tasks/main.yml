---
- name: Install android-tools
  become: true
  ansible.builtin.package:
    name: android-tools
    state: present
  when: ansible_facts["os_family"] == "Archlinux"

- name: Install android-tools
  become: true
  ansible.builtin.package:
    name: android-platform-tools-base
    state: present
  when: ansible_facts["os_family"] != "Archlinux"

- name: Install android-udev
  become: true
  ansible.builtin.package:
    name: android-udev
    state: present
  when: ansible_facts["os_family"] == "Archlinux"

- name: Add user to adbusers group - {{ user.name }}
  become: true
  ansible.builtin.user:
    name: "{{ user.name }}"
    groups: adbusers
    append: true
  when: ansible_facts["os_family"] == "Archlinux"
  tags:
    - user
