---
# Automatic backlight daemon configuration.
# Set to null (default) to skip illuminanced installation and configuration.
# When defined, all sub-keys below are required.
#
# To discover hardware paths on the target machine:
#   max_backlight_file: ls /sys/class/backlight/*/max_brightness
#   backlight_file:     ls /sys/class/backlight/*/brightness
#   illuminance_file:   ls /sys/bus/iio/devices/iio:device*/in_illuminance_raw
#
# Example:
#   backlight_illuminanced:
#     max_backlight_file: /sys/class/backlight/intel_backlight/max_brightness
#     backlight_file: /sys/class/backlight/intel_backlight/brightness
#     illuminance_file: /sys/bus/iio/devices/iio:device0/in_illuminance_raw
#     min_backlight: 1
backlight_illuminanced: null
