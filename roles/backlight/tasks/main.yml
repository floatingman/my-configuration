---
- name: Install brightnessctl
  become: true
  ansible.builtin.package:
    name: brightnessctl
    state: present

- name: Install illuminanced
  become: true
  ansible.builtin.package:
    name: illuminanced
  when: backlight_illuminanced is defined

- name: Set max backlight file
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/illuminanced.toml
    regexp: ^max_backlight_file
    state: present
    line: 'max_backlight_file = "{{ backlight_illuminanced.max_backlight_file }}"'
  when: backlight_illuminanced.max_backlight_file is defined
  notify:
    - restart illuminanced

- name: Set backlight file
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/illuminanced.toml
    regexp: ^backlight_file
    state: present
    line: 'backlight_file = "{{ backlight_illuminanced.backlight_file }}"'
  when: backlight_illuminanced.backlight_file is defined
  notify:
    - restart illuminanced

- name: Set illuminance file
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/illuminanced.toml
    regexp: ^illuminance_file
    state: present
    line: 'illuminance_file = "{{ backlight_illuminanced.illuminance_file }}"'
  when: backlight_illuminanced.illuminance_file is defined
  notify:
    - restart illuminanced

- name: Set min backlight value
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/illuminanced.toml
    regexp: ^min_backlight
    state: present
    line: "min_backlight = {{ backlight_illuminanced.min_backlight }}"
  when: backlight_illuminanced.min_backlight is defined
  notify:
    - restart illuminanced

- name: Enable and start illuminanced
  become: true
  ansible.builtin.service:
    name: illuminanced.service
    enabled: true
    state: started
  when: backlight_illuminanced is defined

- name: Install ddcutil
  become: true
  ansible.builtin.package:
    name: ddcutil
    state: present

- name: Install geoclue
  become: true
  ansible.builtin.package:
    name: geoclue
    state: present
