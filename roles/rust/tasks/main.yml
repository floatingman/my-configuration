---
- name: Check if rustup is installed
  ansible.builtin.stat:
    path: "{{ user_home }}/.cargo/bin/rustup"
  register: rust_rustup_installed
  check_mode: false
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"

- name: Download rustup installer
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: /tmp/rustup-init.sh
    mode: '0755'
  when: not rust_rustup_installed.stat.exists

- name: Install Rust via rustup
  ansible.builtin.command:
    cmd: /tmp/rustup-init.sh -y --default-toolchain stable
  when: not rust_rustup_installed.stat.exists
  changed_when: true

- name: Add cargo to PATH in bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    line: 'source "$HOME/.cargo/env"'
    create: true
    mode: '0644'
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"

- name: Check if fish shell config directory exists
  ansible.builtin.stat:
    path: "{{ user_home }}/.config/fish"
  register: rust_fish_config
  check_mode: false
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"

- name: Add cargo to PATH in fish config
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.config/fish/config.fish"
    line: 'set -gx PATH $HOME/.cargo/bin $PATH'
    create: true
    mode: '0644'
  when: rust_fish_config.stat.exists
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"

- name: Check which cargo packages are already installed
  ansible.builtin.command:
    cmd: "{{ user_home }}/.cargo/bin/cargo install --list"
  register: rust_installed_rust_cargo_packages
  changed_when: false
  failed_when: false
  check_mode: false
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"

- name: Install cargo packages
  ansible.builtin.command:
    cmd: "{{ user_home }}/.cargo/bin/cargo install {{ item }}"
  loop: "{{ rust_cargo_packages | default([]) }}"
  when: item not in rust_installed_rust_cargo_packages.stdout
  register: rust_cargo_install
  changed_when: rust_cargo_install.rc == 0
  vars:
    user_home: "{{ ansible_facts['env'].HOME }}"
