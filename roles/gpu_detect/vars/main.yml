---
# AMD GPU drivers
gpu_drivers_amd:
  - mesa
  - vulkan-radeon
  - lib32-mesa
  - lib32-vulkan-radeon
  - libva-mesa-driver
  - lib32-libva-mesa-driver
  - vulkan-mesa-layers
  - vulkan-tools
  - xf86-video-amdgpu
  - amdgpu_top

# NVIDIA GPU drivers (open source)
gpu_drivers_nvidia_open:
  - mesa
  - vulkan-nouveau
  - lib32-mesa
  - lib32-vulkan-nouveau
  - libva-mesa-driver
  - lib32-libva-mesa-driver
  - vulkan-tools
  - xf86-video-nouveau

# NVIDIA GPU drivers (proprietary)
gpu_drivers_nvidia_prop:
  - nvidia
  - nvidia-utils
  - lib32-nvidia-utils
  - nvidia-settings
  - nvidia-prime

# Intel GPU drivers
gpu_drivers_intel:
  - mesa
  - vulkan-intel
  - lib32-mesa
  - lib32-vulkan-intel
  - libva-intel-driver
  - lib32-libva-intel-driver
  - vulkan-intel
  - vulkan-tools
  - xf86-video-intel

# Default drivers (fallback)
gpu_drivers_default:
  - mesa
  - vulkan-intel  # Use vulkan-intel as it's more commonly available
  - lib32-mesa
  - libva-utils
  - vulkan-tools

# Video tools for GPU types
gpu_video_tools_amd:
  - radeontop
  - libva-utils

gpu_video_tools_nvidia:
  - nvidia-settings

gpu_video_tools_intel:
  - intel-gpu-top

gpu_video_tools_default:
  - libva-utils
