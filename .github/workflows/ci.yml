name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml jinja2 pytest

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Validate profiles
        run: python scripts/profile_dispatcher.py validate --profiles-dir profiles

      - name: Check play.yml sync
        run: python scripts/profile_dispatcher.py sync-playbook --check
